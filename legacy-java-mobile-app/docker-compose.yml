version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: leaflens-postgres
    environment:
      POSTGRES_DB: leaflens
      POSTGRES_USER: leaflens_user
      POSTGRES_PASSWORD: leaflens_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leaflens_user -d leaflens"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local