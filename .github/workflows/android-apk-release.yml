name: Android APK Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_BASE_URL: ${{ vars.EXPO_PUBLIC_API_BASE_URL }}
      EXPO_PUBLIC_GITHUB_OWNER: ${{ vars.EXPO_PUBLIC_GITHUB_OWNER }}
      EXPO_PUBLIC_GITHUB_REPO: ${{ vars.EXPO_PUBLIC_GITHUB_REPO }}
    defaults:
      run:
        working-directory: react-native-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-native-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Compute release version metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          if [[ -z "${MAJOR:-}" || -z "${MINOR:-}" || -z "${PATCH:-}" ]]; then
            echo "Tag must follow vMAJOR.MINOR.PATCH. Received: $TAG"
            exit 1
          fi

          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Set app version for release build
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.meta.outputs.version }}"
          VERSION_CODE="${{ steps.meta.outputs.version_code }}"

          VERSION="$VERSION" VERSION_CODE="$VERSION_CODE" node -e "const fs=require('fs'); const path='app.json'; const app=JSON.parse(fs.readFileSync(path,'utf8')); app.expo.version=process.env.VERSION; app.expo.android=app.expo.android||{}; app.expo.android.versionCode=Number(process.env.VERSION_CODE); fs.writeFileSync(path, JSON.stringify(app, null, 2) + '\n');"

      - name: Install dependencies
        run: npm ci

      - name: Prepare release env
        shell: bash
        run: |
          set -euo pipefail

          API_BASE_URL="${EXPO_PUBLIC_API_BASE_URL:-}"
          if [[ -z "$API_BASE_URL" ]]; then
            API_BASE_URL="https://leaflens-backend.up.railway.app"
            echo "EXPO_PUBLIC_API_BASE_URL was not set in repo variables. Falling back to $API_BASE_URL"
          fi

          OWNER="${EXPO_PUBLIC_GITHUB_OWNER:-}"
          REPO="${EXPO_PUBLIC_GITHUB_REPO:-}"

          if [[ "$REPO" == http*://* ]]; then
            REPO_PATH="${REPO#*github.com/}"
            REPO_PATH="${REPO_PATH%.git}"
            URL_OWNER="${REPO_PATH%%/*}"
            URL_REPO="${REPO_PATH##*/}"

            if [[ -z "$OWNER" ]]; then
              OWNER="$URL_OWNER"
            fi
            REPO="$URL_REPO"
          fi

          if [[ -z "$OWNER" ]]; then
            OWNER="${GITHUB_REPOSITORY%%/*}"
          fi

          if [[ -z "$REPO" ]]; then
            REPO="${GITHUB_REPOSITORY##*/}"
          fi

          cat > .env <<EOF
          EXPO_PUBLIC_API_BASE_URL=$API_BASE_URL
          EXPO_PUBLIC_GITHUB_OWNER=$OWNER
          EXPO_PUBLIC_GITHUB_REPO=$REPO
          EOF

          echo "Prepared build .env for release bundle"

      - name: Generate native Android project
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail
          cd android
          ./gradlew :app:assembleRelease --no-daemon

      - name: Prepare release artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.meta.outputs.version }}"
          SOURCE_APK="android/app/build/outputs/apk/release/app-release.apk"
          OUTPUT_APK="leaflens-${VERSION}.apk"

          if [[ ! -f "$SOURCE_APK" ]]; then
            echo "APK artifact not found at $SOURCE_APK"
            exit 1
          fi

          cp "$SOURCE_APK" "$OUTPUT_APK"
          sha256sum "$OUTPUT_APK" > "${OUTPUT_APK}.sha256"

          echo "apk_path=react-native-app/${OUTPUT_APK}" >> "$GITHUB_OUTPUT"
          echo "sha_path=react-native-app/${OUTPUT_APK}.sha256" >> "$GITHUB_OUTPUT"

      - name: Publish release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LeafLens ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.apk_path }}
            ${{ steps.artifacts.outputs.sha_path }}
